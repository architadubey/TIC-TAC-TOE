<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - AI Tools V3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="glass-panel active">
        <h1 class="logo">TIC <span>TAC</span> TOE</h1>
        <p class="subtitle">AI Tools Project - V3 Web Engine</p>
        
        <div class="settings-group">
            <label>Game Mode</label>
            <div class="toggle-container" id="mode-toggle">
                <div class="toggle-option active" data-val="PVC">vs Computer</div>
                <div class="toggle-option" data-val="PVP">vs Friend</div>
            </div>
        </div>

        <div class="settings-group" id="difficulty-group">
            <label>AI Difficulty</label>
            <div class="toggle-container" id="diff-toggle">
                <div class="toggle-option" data-val="Easy">Easy</div>
                <div class="toggle-option" data-val="Medium">Medium</div>
                <div class="toggle-option active" data-val="Unbeatable">Unbeatable</div>
            </div>
        </div>

        <div class="settings-group">
            <label>Who goes first? ('X')</label>
            <div class="toggle-container" id="turn-toggle">
                <div class="toggle-option active" data-val="Player">Player</div>
                <div class="toggle-option" data-val="Computer">Computer</div>
            </div>
        </div>

        <button class="primary-btn" id="start-btn">INITIALIZE MATcH</button>
    </div>

    <!-- Game View -->
    <div id="game-view" class="glass-panel">
        <div class="top-bar">
            <div class="score-card">
                <span id="p1-label">Player</span>
                <span class="score" id="p1-score">0</span>
            </div>
            <div class="score-card draw-card">
                <span>Draws</span>
                <span class="score" id="draws-score">0</span>
            </div>
            <div class="score-card">
                <span id="p2-label">Computer</span>
                <span class="score" id="p2-score">0</span>
            </div>
        </div>

        <h2 id="status-text">Player's Turn</h2>

        <div class="board-container">
            <div class="board" id="board">
                <!-- Cells generated by JS -->
            </div>
            <!-- SVG for drawing the win line dynamically -->
            <svg id="win-line-svg">
                <line id="win-line" x1="0" y1="0" x2="0" y2="0" />
            </svg>
        </div>

        <div class="bottom-controls">
            <button class="secondary-btn" id="menu-btn">Settings Menu</button>
            <button class="primary-btn hidden" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
